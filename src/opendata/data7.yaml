#
# Data7 datasets definition.
#

# ---- DEFAULT ---------------------------------
default:
  datasets:
    - basename: statuses
      query: >-
        SELECT
          id_pdc_itinerance,
          etat_pdc,
          occupation_pdc,
          horodatage,
          etat_prise_type_2,
          etat_prise_type_combo_ccs,
          etat_prise_type_chademo,
          etat_prise_type_ef
        FROM
          LatestStatus
    - basename: tariffs
      query: >-
        SELECT
          tariff.id::text AS id,
          tariff.original_id,
          tariff.original_last_updated,
          tariff.raw::text AS raw,
          tariff.start,
          tariff."end",
          COALESCE(
            jsonb_agg(
              pointdecharge.id_pdc_itinerance
              ORDER BY pointdecharge.id_pdc_itinerance
            ) FILTER (
              WHERE pointdecharge.id_pdc_itinerance IS NOT NULL
            ),
            '[]'::jsonb
          )::text AS id_pdc_itinerance
        FROM
          tariff
        LEFT JOIN
          pointdechargetariff
          ON pointdechargetariff.tariff_id = tariff.id
        LEFT JOIN
          pointdecharge
          ON pointdecharge.id = pointdechargetariff.point_de_charge_id
        WHERE
          tariff.deleted_at IS NULL
        GROUP BY
          tariff.id,
          tariff.original_id,
          tariff.original_last_updated,
          tariff.raw,
          tariff.start,
          tariff."end",
          tariff.created_at
        ORDER BY
          tariff.created_at
    - basename: statiques
      query: >-
        SELECT
          nom_amenageur,
          siren_amenageur,
          contact_amenageur,
          nom_operateur,
          contact_operateur,
          telephone_operateur,
          nom_enseigne,
          id_station_itinerance,
          id_station_local,
          nom_station,
          implantation_station,
          adresse_station,
          code_insee_commune,
          ST_AsGeoJSON ("coordonneesXY"::geometry)::json -> 'coordinates' AS "coordonneesXY",
          nbre_pdc,
          id_pdc_itinerance,
          id_pdc_local,
          puissance_nominale,
          prise_type_ef,
          prise_type_2,
          prise_type_combo_ccs,
          prise_type_chademo,
          prise_type_autre,
          gratuit,
          paiement_acte,
          paiement_cb,
          paiement_autre,
          tarification,
          condition_acces,
          reservation,
          horaires,
          accessibilite_pmr,
          restriction_gabarit,
          station_deux_roues,
          raccordement,
          num_pdl,
          date_mise_en_service,
          observations,
          date_maj,
          cable_t2_attache
        FROM
          Statique
