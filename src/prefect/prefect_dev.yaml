#
# QualiCharge Prefect deployments
#

deployments:

  # -- Indicators deployments --

  - name: quality-dynamic-staging
    entrypoint: quality/flows/dynamic.py:run_api_db_validation
    schedules:
      - cron: "42 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: staging
      from_now: 
        days: 14
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default

  - name: quality-dynamic-staging-by-amenageur
    entrypoint: quality/flows/dynamic.py:run_api_db_validation_by_amenageur
    schedules:
      - cron: "52 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: staging
      from_now: 
        days: 14
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default

  - name: quality-dynamic-production
    entrypoint: quality/flows/dynamic.py:run_api_db_validation
    schedules:
      - cron: "7 3 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: production
      from_now: 
        days: 14
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default

  - name: quality-dynamic-production-by-amenageur
    entrypoint: quality/flows/dynamic.py:run_api_db_validation_by_amenageur
    schedules:
      - cron: "17 3 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: production
      from_now: 
        days: 14
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default