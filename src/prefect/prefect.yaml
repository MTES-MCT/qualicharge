#
# QualiCharge Prefect deployments
#

deployments:
  - name: i1-daily
    entrypoint: indicators/run.py:i1_calculate
    concurrency_limit: 10
    schedules:
      - cron: "0 14 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      period: d
      create_artifact: true
      chunk_size: 1000
    work_pool:
      name: indicators
      work_queue_name: default
  - name: t1-daily
    entrypoint: indicators/run.py:t1_calculate
    concurrency_limit: 10
    schedules:
      - cron: "10 14 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      period: d
      create_artifact: true
      chunk_size: 1000
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-development
    entrypoint: quality/flows.py:run_api_db_validation
    parameters:
      environment: development
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-development-by-amenageur
    entrypoint: quality/flows.py:run_api_db_validation_by_amenageur
    parameters:
      environment: development
    work_pool:
      name: indicators
      work_queue_name: default
