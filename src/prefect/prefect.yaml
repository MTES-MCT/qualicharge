#
# QualiCharge Prefect deployments
#

deployments:

  # -- Indicators deployments --



  # -- Quality deployments --

  - name: quality-static-staging
    entrypoint: quality/flows/quality_run.py:run_api_db_validation
    schedules:
      - cron: "2 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: staging
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-static-staging-by-amenageur
    entrypoint: quality/flows/quality_run.py:run_api_db_validation_by_amenageur
    schedules:
      - cron: "12 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: staging
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-static-production
    entrypoint: quality/flows/quality_run.py:run_api_db_validation
    schedules:
      - cron: "22 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: production
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-static-production-by-amenageur
    entrypoint: quality/flows/quality_run.py:run_api_db_validation_by_amenageur
    schedules:
      - cron: "32 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: production
      report_by_email: true
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-dynamic-staging
    entrypoint: quality/flows/quality_run.py:run_api_db_validation
    schedules:
      - cron: "42 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: staging
      report_by_email: true
      quality_type: "dynamic"
    work_pool:
      name: indicators
      work_queue_name: default
  - name: quality-dynamic-staging-by-amenageur
    entrypoint: quality/flows/quality_run.py:run_api_db_validation_by_amenageur
    schedules:
      - cron: "52 2 * * *"
        timezone: "Europe/Paris"
        active: true
    parameters:
      environment: staging
      report_by_email: true
      quality_type: "dynamic"
    work_pool:
      name: indicators
      work_queue_name: default
